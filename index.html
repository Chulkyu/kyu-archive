<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kyu의 AI 영상 라이브러리</title>
  <meta name="description" content="AI가 자동으로 요약한 영상 지식 베이스">
  <meta property="og:title" content="Kyu의 AI 영상 라이브러리">
  <meta property="og:description" content="AI가 자동으로 요약한 영상 지식 베이스">

  <meta property="og:image" content="https://img.youtube.com/vi/9IuIwXAz_84/maxresdefault.jpg">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/variable/pretendardvariable.css');
    body { font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; }

    .gradient-text {
      background: linear-gradient(135deg, #7c3aed 0%, #2563eb 50%, #0891b2 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .tool-card { transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s ease; }
    .tool-card:hover { transform: translateY(-6px); }
    .hero-bg {
      background:
        radial-gradient(ellipse at top left, rgba(124,58,237,0.12) 0%, transparent 55%),
        radial-gradient(ellipse at bottom right, rgba(37,99,235,0.08) 0%, transparent 55%);
    }
    .dark .hero-bg {
      background:
        radial-gradient(ellipse at top left, rgba(124,58,237,0.22) 0%, transparent 55%),
        radial-gradient(ellipse at bottom right, rgba(37,99,235,0.15) 0%, transparent 55%);
    }
    .section-line { background: linear-gradient(90deg, transparent, #7c3aed 30%, #2563eb 70%, transparent); height: 1px; }
    html { scroll-behavior: smooth; }

    /* Index-page additions */
    .card-thumb { aspect-ratio: 16/9; object-fit: cover; width: 100%; display: block; }
    .filter-btn { background: #f1f5f9; color: #64748b; border: 1px solid transparent; transition: background 0.15s, color 0.15s; }
    .dark .filter-btn { background: #1e293b; color: #94a3b8; }
    .filter-btn.active-filter { background: #7c3aed; color: white; border-color: #6d28d9; }
    .filter-btn:hover:not(.active-filter) { background: #e2e8f0; }
    .dark .filter-btn:hover:not(.active-filter) { background: #293548; }
    .search-input:focus { outline: none; box-shadow: 0 0 0 3px rgba(124,58,237,0.25); }
    .skeleton { animation: skeleton-pulse 1.5s ease infinite; background: #e2e8f0; border-radius: 0.5rem; }
    .dark .skeleton { background: #334155; }
    @keyframes skeleton-pulse { 0%,100%{ opacity:.4 } 50%{ opacity:.8 } }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }

    /* Dark mode SVG adjustments */
    .dark .svg-back-1 { fill: #475569; }
    .dark .svg-back-2 { fill: #1e3a8a; }
    .dark .svg-front  { fill: #1e293b; stroke: url(#cardBorderDark); }
    .dark .svg-line-1 { fill: #6d28d9; }
    .dark .svg-line-2 { fill: #475569; }
    .dark .svg-line-3 { fill: #334155; }
  </style>
</head>
<body class="bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 transition-colors duration-300">
<script>
  if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.classList.add('dark');
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
    e.matches ? document.documentElement.classList.add('dark') : document.documentElement.classList.remove('dark');
  });
</script>

<!-- ── JAVASCRIPT ─────────────────────────────────────────────── -->
<!-- Note: fetch('index.json') requires HTTP server on local dev.
     Use: python3 -m http.server 8000 → http://localhost:8000 -->
<script>
  // ── Constants ──────────────────────────────────────────────────
  const CATEGORY_MAP = {
    tech:     { label: '기술',     badge: 'bg-violet-600' },
    finance:  { label: '금융',     badge: 'bg-emerald-600' },
    business: { label: '비즈니스', badge: 'bg-amber-500' },
  };

  function getCat(cat) {
    return CATEGORY_MAP[cat] ?? { label: cat, badge: 'bg-slate-500' };
  }

  // ── State ───────────────────────────────────────────────────────
  const state = { reports: [], query: '', category: 'all', sort: 'recent' };

  // ── Utilities ───────────────────────────────────────────────────
  function escapeHtml(s) {
    return String(s ?? '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function makePlaceholderSrc() {
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="480" height="270"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7c3aed"/><stop offset="50%" stop-color="#2563eb"/><stop offset="100%" stop-color="#0891b2"/></linearGradient></defs><rect width="480" height="270" fill="url(#g)"/><text x="240" y="150" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="48" font-family="sans-serif">▶</text></svg>`;
    return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
  }

  function handleThumbError(img, videoId) {
    if (img.src.includes('maxresdefault')) {
      img.src = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
    } else {
      img.onerror = null;
      img.src = makePlaceholderSrc();
    }
  }

  function animateCount(el, target) {
    if (target === 0) { el.textContent = '0'; return; }
    let cur = 0;
    const step = Math.ceil(target / 20);
    const timer = setInterval(() => {
      cur = Math.min(cur + step, target);
      el.textContent = cur;
      if (cur >= target) clearInterval(timer);
    }, 30);
  }

  // ── Render: Featured Card ───────────────────────────────────────
  function renderFeatured(r) {
    if (!r) return;
    const cat = getCat(r.category);
    const title = escapeHtml(r.title ?? '제목 없음');
    const channel = escapeHtml(r.channel ?? '');
    const summary = escapeHtml(r.summary ?? '');
    const vid = escapeHtml(r.video_id ?? '');
    const href = escapeHtml(r.report_url ?? '#');
    const thumb = escapeHtml(r.thumbnail_url ?? '');

    document.getElementById('featured-card').innerHTML = `
      <a href="${href}" class="tool-card group block bg-white dark:bg-slate-800 rounded-2xl
         border border-slate-100 dark:border-slate-700 shadow-sm
         hover:shadow-xl hover:border-violet-200 dark:hover:border-violet-700 overflow-hidden
         grid md:grid-cols-[280px_1fr]">
        <div class="relative overflow-hidden bg-slate-100 dark:bg-slate-700">
          <img class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-105" style="aspect-ratio:16/9"
               src="${thumb}" alt="${title}" loading="lazy"
               onerror="handleThumbError(this,'${vid}')">
          <span class="absolute top-3 right-3 ${escapeHtml(cat.badge)} text-white text-xs font-bold px-2.5 py-0.5 rounded-full shadow">
            ${escapeHtml(cat.label)}
          </span>
          <span class="absolute top-3 left-3 bg-amber-400 text-amber-900 text-xs font-bold px-2.5 py-0.5 rounded-full">
            ✨ 최신
          </span>
        </div>
        <div class="p-6 flex flex-col justify-between">
          <div>
            <h3 class="text-lg font-bold leading-snug mb-2 line-clamp-2">${title}</h3>
            <p class="text-sm text-slate-500 dark:text-slate-400 mb-3">${channel}</p>
            <p class="text-sm text-slate-600 dark:text-slate-300 line-clamp-2">${summary}</p>
          </div>
          <div class="flex items-center gap-4 mt-4 text-xs text-slate-400 dark:text-slate-500">
            <span>⏱ ${escapeHtml(r.duration_string ?? '–')}</span>
            <span>📅 ${escapeHtml(r.processed_date ?? '')}</span>
          </div>
        </div>
      </a>`;
  }

  // ── Render: Card ────────────────────────────────────────────────
  function renderCard(r) {
    const cat = getCat(r.category);
    const title = escapeHtml(r.title ?? '제목 없음');
    const channel = escapeHtml(r.channel ?? '');
    const summary = escapeHtml(r.summary ?? '');
    const vid = escapeHtml(r.video_id ?? '');
    const href = escapeHtml(r.report_url ?? '#');
    const thumb = escapeHtml(r.thumbnail_url ?? '');

    return `
      <a href="${href}" class="tool-card group block bg-white dark:bg-slate-800 rounded-2xl
         border border-slate-100 dark:border-slate-700 shadow-sm
         hover:shadow-xl hover:border-violet-200 dark:hover:border-violet-700 overflow-hidden">
        <div class="relative overflow-hidden bg-slate-100 dark:bg-slate-700">
          <img class="card-thumb transition-transform duration-300 group-hover:scale-105"
               src="${thumb}" alt="${title}" loading="lazy"
               onerror="handleThumbError(this,'${vid}')">
          <span class="absolute top-2 right-2 ${escapeHtml(cat.badge)} text-white text-xs font-bold px-2 py-0.5 rounded-full shadow">
            ${escapeHtml(cat.label)}
          </span>
        </div>
        <div class="p-4">
          <h3 class="text-sm font-bold leading-snug mb-1.5 line-clamp-2">${title}</h3>
          <p class="text-xs text-slate-500 dark:text-slate-400 mb-1.5">${channel}</p>
          <p class="text-xs text-slate-600 dark:text-slate-300 line-clamp-1 mb-3">${summary}</p>
          <div class="flex items-center justify-between text-xs text-slate-400 dark:text-slate-500">
            <span>⏱ ${escapeHtml(r.duration_string ?? '–')}</span>
            <span>${escapeHtml(r.processed_date ?? '')}</span>
          </div>
        </div>
      </a>`;
  }

  // ── Filter / Sort / Render ──────────────────────────────────────
  function getFilteredSorted() {
    let list = [...state.reports];
    if (state.query) {
      const q = state.query.toLowerCase();
      list = list.filter(r =>
        (r.title ?? '').toLowerCase().includes(q) ||
        (r.channel ?? '').toLowerCase().includes(q) ||
        (r.summary ?? '').toLowerCase().includes(q)
      );
    }
    if (state.category !== 'all') {
      list = list.filter(r => r.category === state.category);
    }
    if (state.sort === 'recent') {
      list.sort((a, b) => (b.processed_date ?? '').localeCompare(a.processed_date ?? ''));
    } else {
      list.sort((a, b) => (b.duration_seconds ?? 0) - (a.duration_seconds ?? 0));
    }
    return list;
  }

  function emptyStateHTML() {
    const hasQuery = state.query.length > 0;
    const hasCat = state.category !== 'all';
    const catLabel = getCat(state.category).label;

    let title, body;
    if (hasQuery && hasCat) {
      title = '조건에 맞는 레포트가 없어요';
      body  = '검색어와 필터 조합을 바꿔보세요';
    } else if (hasQuery) {
      title = `'${escapeHtml(state.query)}'에 대한 결과가 없어요`;
      body  = '검색어를 바꿔보거나 필터를 초기화해보세요';
    } else {
      title = `${escapeHtml(catLabel)} 레포트가 아직 없어요`;
      body  = '다른 카테고리를 선택하거나 나중에 다시 확인해주세요';
    }

    document.getElementById('empty-title').innerHTML = title;
    document.getElementById('empty-body').textContent = body;
  }

  function applyFiltersAndRender() {
    const list = getFilteredSorted();
    const grid  = document.getElementById('card-grid');
    const empty = document.getElementById('empty-state');
    const countEl = document.getElementById('result-count');

    countEl.textContent = list.length;

    if (list.length === 0) {
      grid.classList.add('hidden');
      empty.classList.remove('hidden');
      emptyStateHTML();
    } else {
      empty.classList.add('hidden');
      grid.classList.remove('hidden');
      grid.innerHTML = list.map(renderCard).join('');
    }
  }

  // ── Populate meta / stats ───────────────────────────────────────
  function populateMeta(data) {
    const count = data.reports.length;
    const updated = (data.updated_at ?? '').split('T')[0];
    const metaCount   = document.getElementById('meta-count');
    const metaUpdated = document.getElementById('meta-updated');
    metaCount.textContent   = `📚 ${count}편`;
    metaUpdated.textContent = `🔄 ${updated} 업데이트`;
    metaCount.classList.remove('opacity-0');
    metaUpdated.classList.remove('opacity-0');
  }

  const STAT_CATEGORY = {
    tech:     { label: '기술 영상',     color: 'text-violet-600 dark:text-violet-400' },
    finance:  { label: '금융 영상',     color: 'text-emerald-600 dark:text-emerald-400' },
    business: { label: '비즈니스 영상', color: 'text-amber-500 dark:text-amber-400' },
  };

  function populateStats(data) {
    const total = data.reports.length;
    const latestDate = data.reports
      .map(r => r.processed_date ?? '')
      .filter(Boolean)
      .sort((a, b) => b.localeCompare(a))[0] ?? '–';

    const catCounts = {};
    data.reports.forEach(r => { if (r.category) catCounts[r.category] = (catCounts[r.category] ?? 0) + 1; });
    const activeCats = Object.keys(STAT_CATEGORY).filter(c => catCounts[c]);

    const container = document.getElementById('stats-container');
    const cols = 1 + activeCats.length + 1;
    container.className = 'max-w-5xl mx-auto grid gap-4';
    container.style.gridTemplateColumns = `repeat(${cols}, minmax(0, 1fr))`;

    const catTiles = activeCats.map(cat => {
      const { label, color } = STAT_CATEGORY[cat];
      return `<div class="bg-white dark:bg-slate-800 rounded-2xl p-5 text-center border border-slate-100 dark:border-slate-700 shadow-sm">
        <div id="stat-${cat}" class="text-3xl font-black ${color}">–</div>
        <div class="text-xs text-slate-500 dark:text-slate-400 mt-1 font-medium">${label}</div>
      </div>`;
    }).join('');

    const recentTile = container.querySelector('#stat-recent').closest('div');
    recentTile.insertAdjacentHTML('beforebegin', catTiles);

    animateCount(document.getElementById('stat-total'), total);
    activeCats.forEach(cat => animateCount(document.getElementById(`stat-${cat}`), catCounts[cat]));
    document.getElementById('stat-recent').textContent = latestDate;
  }

  // ── Reset filters ───────────────────────────────────────────────
  function resetFilters() {
    state.query    = '';
    state.category = 'all';
    document.getElementById('search-input').value = '';
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active-filter'));
    document.querySelector('[data-cat="all"]').classList.add('active-filter');
    applyFiltersAndRender();
  }

  // ── Fetch error ─────────────────────────────────────────────────
  function showFetchError() {
    document.getElementById('skeleton-grid').innerHTML = `
      <div class="col-span-3 text-center py-20 text-slate-400 dark:text-slate-500">
        <p class="text-lg font-bold mb-2">데이터를 불러오지 못했어요</p>
        <p class="text-sm mb-5">인터넷 연결을 확인하거나 잠시 후 다시 시도해주세요</p>
        <button onclick="location.reload()" class="px-5 py-2.5 bg-violet-600 text-white text-sm font-semibold rounded-xl hover:bg-violet-700 transition-colors">
          새로고침
        </button>
      </div>`;
  }

  // ── Event Listeners ─────────────────────────────────────────────
  document.getElementById('search-input').addEventListener('input', e => {
    state.query = e.target.value.trim();
    applyFiltersAndRender();
  });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.category = btn.dataset.cat;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active-filter'));
      btn.classList.add('active-filter');
      applyFiltersAndRender();
    });
  });

  document.getElementById('sort-select').addEventListener('change', e => {
    state.sort = e.target.value;
    applyFiltersAndRender();
  });

  // ── Boot ─────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    fetch('index.json')
      .then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      })
      .then(data => {
        state.reports = data.reports ?? [];

        // Hide skeletons
        const skeletonGrid = document.getElementById('skeleton-grid');
        skeletonGrid.remove();
        document.getElementById('card-grid').classList.remove('hidden');

        populateMeta(data);
        populateStats(data);

        if (state.reports.length > 0) {
          renderFeatured(state.reports[0]);
        } else {
          document.getElementById('featured-card').innerHTML = '';
        }

        applyFiltersAndRender();
      })
      .catch(err => {
        console.error('index.json fetch failed:', err);
        showFetchError();
      });
  });
</script>
</body>
</html>
